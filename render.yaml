services:
  - type: web
    name: crm-sync-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CRM_JWT_SECRET
        sync: false
      - key: CRM_ALLOW_REGISTER
        value: "true"
        sync: false
