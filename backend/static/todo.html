<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日 To-Do</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>window.__CRM_ASSET_V = "20260428j";</script>
    <link rel="stylesheet" href="./styles.css?v=20260428j" />
  </head>
  <body>
    <main class="wrap">
      <header class="header">
        <div>
          <h1>每日 To-Do</h1>
          <p class="sub">默认显示全部未完成（含未来截止）；需要只看今天要做的可切到「今日待办」。</p>
        </div>
        <a id="crmNavBack" class="btn btn-secondary" href="./index.html">返回 CRM</a>
      </header>

      <section class="panel todo-panel">
        <div class="todo-headline">
          <h2>今日任务清单</h2>
          <p class="sub">默认「待完成」含未来截止（节日提醒、每周任务等）；若选「今日待办」则只显示截止≤今天或未设截止。</p>
          <p class="sub" style="opacity: 0.75">页面版本 20260428j（若此处不是该版本说明仍在用缓存，请 Ctrl+F5）</p>
        </div>
        <form id="todoForm" class="todo-form">
          <input id="todoText" class="input" maxlength="160" placeholder="输入今天要完成的任务..." required />
          <input id="todoDueDate" class="input" type="date" />
          <select id="todoRepeat" class="select">
            <option value="none" selected>不重复</option>
            <option value="daily">每天</option>
            <option value="workday">工作日</option>
            <option value="weekly">每周</option>
            <option value="monthly">每月</option>
          </select>
          <select id="todoPriority" class="select">
            <option value="high">高优先级</option>
            <option value="medium" selected>中优先级</option>
            <option value="low">低优先级</option>
          </select>
          <div class="todo-form-actions">
            <button id="btnTodoAdd" class="btn" type="submit">添加任务</button>
            <button id="btnTodoCancelEdit" class="btn btn-secondary" type="button" hidden>取消编辑</button>
          </div>
        </form>

        <div class="todo-toolbar">
          <select id="todoFilter" class="select">
            <option value="today_do">今日待办</option>
            <option value="all">全部</option>
            <option value="pending" selected>待完成</option>
            <option value="today">今天到期</option>
            <option value="overdue">已逾期</option>
            <option value="done">已完成</option>
          </select>
          <button id="btnTodoRestore" class="btn btn-secondary" type="button">恢复To-Do数据</button>
          <button id="btnTodoClearDone" class="btn btn-secondary" type="button">清除已完成</button>
        </div>

        <div class="todo-stats-cards">
          <div class="todo-stat-card"><span>总计</span><strong id="todoStatTotal">0</strong></div>
          <div class="todo-stat-card"><span>待办</span><strong id="todoStatPending">0</strong></div>
          <div class="todo-stat-card"><span>今天到期</span><strong id="todoStatToday">0</strong></div>
          <div class="todo-stat-card"><span>逾期</span><strong id="todoStatOverdue">0</strong></div>
          <div class="todo-stat-card"><span>完成</span><strong id="todoStatDone">0</strong></div>
        </div>
        <div id="todoStats" class="sub todo-stats-line"></div>
        <div id="todoList" class="todo-list"></div>
      </section>
    </main>

    <script>
      (function () {
        var a = document.getElementById("crmNavBack");
        if (a) a.href = "./index.html?v=" + encodeURIComponent(window.__CRM_ASSET_V || "0");
      })();
    </script>
    <script src="./todo.js?v=20260428j" defer></script>
  </body>
 </html>
